name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
        env:
          CI: true
      - name: Run Lint
        run: npm run lint
      - name: Run Unit Test
        run: npm run unit
      - name: Run E2E Test
        run: npm run integration
        env:
          GIF_API_KEY: ${{ secrets.GIF_API_KEY }}
