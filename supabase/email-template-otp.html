<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your GifDay code</title>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f9f9f9; font-family: Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f9f9f9; padding: 40px 0;">
      <tr>
        <td align="center">
          <table width="520" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08);">

            <!-- Header -->
            <tr>
              <td align="center" style="background: linear-gradient(135deg, #FF6B6B, #4ECDC4); padding: 36px 40px 32px;">
                <p style="margin: 0; font-size: 13px; color: rgba(255,255,255,0.85); letter-spacing: 3px; text-transform: uppercase;">have a</p>
                <h1 style="margin: 4px 0 0; font-size: 42px; color: #ffffff; letter-spacing: 2px; font-weight: 900; text-transform: uppercase;">Gify Day!</h1>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td align="center" style="padding: 40px 40px 16px;">
                <p style="margin: 0 0 8px; font-size: 16px; color: #555555; line-height: 1.6;">
                  Here's your sign-in code:
                </p>
              </td>
            </tr>

            <!-- Code -->
            <tr>
              <td align="center" style="padding: 0 40px 32px;">
                <div style="display: inline-block; background: #f4f4f4; border-radius: 12px; padding: 20px 48px;">
                  <span style="font-size: 40px; font-weight: 900; letter-spacing: 10px; color: #FF6B6B; font-family: 'Courier New', monospace;">{{ .Token }}</span>
                </div>
                <p style="margin: 20px 0 0; font-size: 13px; color: #aaaaaa;">
                  This code expires in 10 minutes.
                </p>
              </td>
            </tr>

            <!-- Magic link -->
            <tr>
              <td align="center" style="padding: 0 40px 32px;">
                <p style="margin: 0 0 12px; font-size: 13px; color: #aaaaaa;">or</p>
                <a href="{{ .ConfirmationURL }}"
                   style="display: inline-block; background: linear-gradient(135deg, #FF6B6B, #4ECDC4); color: #ffffff; text-decoration: none; padding: 14px 36px; border-radius: 999px; font-size: 13px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;">
                  Sign in with one click
                </a>
              </td>
            </tr>

            <!-- Divider -->
            <tr>
              <td style="padding: 0 40px;">
                <div style="border-top: 1px solid #eeeeee;"></div>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td align="center" style="padding: 24px 40px 32px;">
                <p style="margin: 0; font-size: 12px; color: #cccccc; line-height: 1.8;">
                  If you didn't request this, you can safely ignore this email.<br/>
                  Your year in GIFs &mdash; <a href="https://gifday.netlify.com" style="color: #4ECDC4; text-decoration: none;">gifday.netlify.com</a>
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
