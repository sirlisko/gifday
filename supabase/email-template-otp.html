<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your GifDay code</title>
</head>

<body style="margin: 0; padding: 0; background-color: #FBFBF9; font-family: Inter, Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #FBFBF9; padding: 40px 0;">
    <tr>
      <td align="center">
        <table width="520" cellpadding="0" cellspacing="0"
          style="background-color: #ffffff; border: 3px solid #000000; box-shadow: 8px 8px 0 0 #000000;">

          <!-- Header -->
          <tr>
            <td align="center" style="background-color: #FDC800; padding: 36px 40px 32px; border-bottom: 3px solid #000000;">
              <p
                style="margin: 0; font-size: 13px; color: #1C293C; letter-spacing: 3px; text-transform: uppercase; font-weight: 700;">
                have a</p>
              <h1
                style="margin: 4px 0 0; font-size: 42px; color: #1C293C; letter-spacing: 2px; font-weight: 900; text-transform: uppercase;">
                Gify Day!</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td align="center" style="padding: 40px 40px 16px;">
              <p style="margin: 0 0 8px; font-size: 16px; color: #1C293C; line-height: 1.6; font-weight: 500;">
                Here's your sign-in code:
              </p>
            </td>
          </tr>

          <!-- Code -->
          <tr>
            <td align="center" style="padding: 0 40px 32px;">
              <div
                style="display: inline-block; background: #FBFBF9; padding: 20px 48px; border: 2px solid #000000; box-shadow: 4px 4px 0 0 #000000;">
                <span
                  style="font-size: 40px; font-weight: 700; letter-spacing: 10px; color: #1C293C; font-family: 'JetBrains Mono', 'Courier New', monospace;">{{ .Token }}</span>
              </div>
              <p style="margin: 20px 0 0; font-size: 13px; color: #888888;">
                This code expires in 10 minutes.
              </p>
            </td>
          </tr>

          <!-- Magic link -->
          <tr>
            <td align="center" style="padding: 0 40px 32px;">
              <p style="margin: 0 0 12px; font-size: 13px; color: #888888;">or</p>
              <a href="{{ .ConfirmationURL }}"
                style="display: inline-block; background-color: #FDC800; color: #1C293C; text-decoration: none; padding: 14px 36px; font-size: 13px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; border: 2px solid #000000; box-shadow: 3px 3px 0 0 #000000;">
                Sign in with one click
              </a>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 0 40px;">
              <div style="border-top: 1px solid #eeeeee;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding: 24px 40px 32px;">
              <p style="margin: 0; font-size: 12px; color: #aaaaaa; line-height: 1.8;">
                If you didn't request this, you can safely ignore this email.<br />
                Your year in GIFs &mdash; <a href="https://gifday.sirlisko.com"
                  style="color: #432DD7; text-decoration: none; font-weight: 600;">gifday.sirlisko.com</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>

</html>
